name: Release Pipeline

on:
  push:
    tags:
      - 'v*' # Trigger on version tags (e.g., v1.0.0)

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Linting
        run: npm run lint

      # - name: Run Tests
      #   run: npm test

      - name: Run Build Pipeline (Frontend + Backend + Bundling)
        run: npx tsx build/build.ts

      - name: Download Portable Node
        run: |
          Invoke-WebRequest -Uri "https://nodejs.org/dist/v22.0.0/node-v22.0.0-win-x64.zip" -OutFile "node.zip"
          Expand-Archive "node.zip" -DestinationPath "."
          Copy-Item "node-v22.0.0-win-x64\node.exe" -Destination "release\GestureControl\node\node.exe"

      # Note: Steps to download Portable Python and MediaPipe models would go here

      - name: Install NSIS
        run: choco install nsis

      - name: Build Installer
        run: makensis installer/main.nsi

      - name: Generate Checksums
        run: |
          cd release
          $hash = (Get-FileHash GestureControl_Setup.exe -Algorithm SHA256).Hash
          echo $hash > GestureControl_Setup.exe.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            release/GestureControl_Setup.exe
            release/GestureControl_Setup.exe.sha256
            release-manifest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
